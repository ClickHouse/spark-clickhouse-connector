# Local Apache Superset preview for the ClickBench load-test metrics (perf.*).
#
# Usage:
#   cd benchmarks/dashboard/superset
#   export TARGET_CH_HOST=<metrics clickhouse host>
#   export TARGET_CH_USER=<user>  TARGET_CH_PASSWORD=<password>
#   docker compose up -d --build       # first run pulls/builds (~1-2 GB)
#   ./bootstrap.sh                      # one-time: admin user + db upgrade + init
#   docker cp ../queries.sql clickbench-superset:/tmp/queries.sql
#   docker cp build_superset.py clickbench-superset:/tmp/build_superset.py
#   docker cp describe_charts.py clickbench-superset:/tmp/describe_charts.py
#   docker exec clickbench-superset python /tmp/build_superset.py    # DB + datasets + charts + dashboard
#   docker exec clickbench-superset python /tmp/describe_charts.py   # chart descriptions
#   open http://localhost:8088   (admin / admin)
#
# Stop with `docker compose down` (add -v to also wipe the metadata volume).

services:
  superset:
    build: .
    container_name: clickbench-superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "clickbench-local-preview-not-a-secret-change-me"
      TALISMAN_ENABLED: "false"
      # Passed through to build_superset.py (run via docker exec) so the
      # ClickHouse password is never baked into the image or the repo.
      TARGET_CH_HOST: "${TARGET_CH_HOST:-}"
      TARGET_CH_USER: "${TARGET_CH_USER:-default}"
      TARGET_CH_PASSWORD: "${TARGET_CH_PASSWORD:-}"
    volumes:
      - superset_home:/app/superset_home   # persists the SQLite metadata DB

volumes:
  superset_home:
