name: "ClickBench Load Test"

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC - Placeholder, replace with actual schedule
  workflow_dispatch:
    inputs:
      input_parquet_glob:
        description: "Override input glob (default = full 100 files)"
        required: false
        default: "s3a://clickhouse-public-datasets/hits_compatible/athena_partitioned/hits_*.parquet"
      connector:
        description: "Connector under test (tags the run)"
        required: false
        default: "spark"
      run_profile:
        description: "Cluster sizing / tier label (e.g. small, big)"
        required: false
        default: "small"

jobs:
  load-test:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
      # EMR 7.13.0 ships Spark 3.5.6 + Scala 2.12. As of mid-2026 no EMR 7.x
      # release bundles Spark 4, so the connector jar must be built for
      # 3.5_2.12 to match. Bump this if a Spark-4 EMR release appears.
      EMR_RELEASE_LABEL: emr-7.13.0
      EMR_INSTANCE_TYPE: m6i.2xlarge
      EMR_CORE_COUNT: "4"
      CH_DATABASE: clickbench
      CH_TABLE: hits
      CH_SECRET_ID: clickbench-load-test/target-ch-password
      INPUT_PARQUET_GLOB: ${{ inputs.input_parquet_glob || 's3a://clickhouse-public-datasets/hits_compatible/athena_partitioned/hits_*.parquet' }}
      # Run dimensions recorded on perf.runs (and exported to the DWH).
      CONNECTOR: ${{ inputs.connector || 'spark' }}
      RUN_PROFILE: ${{ inputs.run_profile || 'small' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ClickHouse client (clickhouse-connect) + boto3
        run: pip install --quiet clickhouse-connect boto3

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CLICKBENCH_AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build connector runtime jar
        run: |
          ./gradlew -Dspark_binary_version=3.5 -Dscala_binary_version=2.12 \
            :clickhouse-spark-runtime-3.5_2.12:shadowJar --no-daemon

      - name: Compute run id and S3 paths
        run: |
          source benchmarks/scripts/lib_runid.sh
          echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          echo "RUN_START=$RUN_START" >> "$GITHUB_ENV"
          echo "EVENT_LOG_DIR_SPARK=s3a://${{ secrets.CLICKBENCH_S3_BUCKET }}/spark-event-logs/$RUN_ID/" >> "$GITHUB_ENV"
          # EMR 7.13 ships Spark 3.5.6, which writes a single flat event-log
          # file (application_<appId>_1) - rolling format (eventlog_v2_*/) is
          # Spark 4.0+ only. Match the flat file. If we ever move to a Spark-4
          # EMR release, switch this glob to eventlog_v2_*/events_*.
          echo "EVENT_LOG_URI=s3://${{ secrets.CLICKBENCH_S3_BUCKET }}/spark-event-logs/$RUN_ID/application_*" >> "$GITHUB_ENV"
          echo "JAR_S3_URI=s3://${{ secrets.CLICKBENCH_S3_BUCKET }}/jars/$RUN_ID/clickhouse-spark-runtime.jar" >> "$GITHUB_ENV"
          echo "SCRIPT_S3_URI=s3://${{ secrets.CLICKBENCH_S3_BUCKET }}/scripts/$RUN_ID/clickbench_ingest.py" >> "$GITHUB_ENV"

      - name: Upload jar and script to S3
        run: |
          # The runtime build/libs may also hold thin -empty/-sources/-javadoc
          # jars; the shaded fat jar is the one we need. Exclude those classifiers
          # and pick the largest (the fat jar dwarfs them) to avoid uploading the
          # wrong artifact.
          JAR=$(ls -S spark-3.5/clickhouse-spark-runtime/build/libs/clickhouse-spark-runtime-3.5_2.12-*.jar \
                | grep -Ev '(sources|javadoc|empty)\.jar$' | head -1)
          aws s3 cp "$JAR" "$JAR_S3_URI"
          aws s3 cp benchmarks/clickbench_ingest.py "$SCRIPT_S3_URI"

      - name: Bootstrap schema (idempotent CREATE IF NOT EXISTS)
        # Creates clickbench.hits on the target service and perf.{runs,
        # metrics, ch_inserts} on the metrics service if any are missing.
        env:
          TARGET_CH_HOST: ${{ secrets.CLICKBENCH_TARGET_CH_HOST }}
          TARGET_CH_USER: ${{ secrets.CLICKBENCH_TARGET_CH_USER }}
          TARGET_CH_PASSWORD: ${{ secrets.CLICKBENCH_TARGET_CH_PASSWORD }}
          METRICS_CH_HOST: ${{ secrets.CLICKBENCH_METRICS_CH_HOST }}
          METRICS_CH_USER: ${{ secrets.CLICKBENCH_METRICS_CH_USER }}
          METRICS_CH_PASSWORD: ${{ secrets.CLICKBENCH_METRICS_CH_PASSWORD }}
        run: python benchmarks/scripts/bootstrap_schema.py

      - name: Truncate target table
        env:
          TARGET_CH_HOST: ${{ secrets.CLICKBENCH_TARGET_CH_HOST }}
          TARGET_CH_USER: ${{ secrets.CLICKBENCH_TARGET_CH_USER }}
          TARGET_CH_PASSWORD: ${{ secrets.CLICKBENCH_TARGET_CH_PASSWORD }}
          CH_DATABASE: clickbench
          CH_TABLE: hits
          SKIP_TRUNCATE: ${{ vars.SKIP_TRUNCATE || '0' }}
        run: python benchmarks/scripts/truncate_target.py

      - name: Provision EMR
        env:
          EMR_LOG_URI: s3://${{ secrets.CLICKBENCH_S3_BUCKET }}/emr-logs/
          EMR_SUBNET_ID: ${{ secrets.CLICKBENCH_EMR_SUBNET_ID }}
          EMR_EC2_KEY_NAME: ${{ secrets.CLICKBENCH_EMR_KEY_NAME }}
          EMR_SERVICE_ROLE: ${{ secrets.CLICKBENCH_EMR_SERVICE_ROLE }}
          EMR_INSTANCE_PROFILE: ${{ secrets.CLICKBENCH_EMR_INSTANCE_PROFILE }}
        run: |
          CLUSTER_ID=$(benchmarks/scripts/emr_provision.sh)
          echo "CLUSTER_ID=$CLUSTER_ID" >> "$GITHUB_ENV"

      - name: Ensure CH password in Secrets Manager
        env:
          CH_PASSWORD: ${{ secrets.CLICKBENCH_TARGET_CH_PASSWORD }}
        run: |
          if aws secretsmanager describe-secret --secret-id "$CH_SECRET_ID" >/dev/null 2>&1; then
            echo "Secrets Manager secret $CH_SECRET_ID already exists; leaving it"
          else
            aws secretsmanager create-secret --name "$CH_SECRET_ID" \
              --secret-string "$CH_PASSWORD" >/dev/null
            echo "created Secrets Manager secret $CH_SECRET_ID"
          fi

      - name: Submit Spark step
        id: submit
        env:
          CH_HOST: ${{ secrets.CLICKBENCH_TARGET_CH_HOST }}
          CH_PORT: ${{ secrets.CLICKBENCH_TARGET_CH_PORT }}
          CH_PROTOCOL: https
          CH_USER: ${{ secrets.CLICKBENCH_TARGET_CH_USER }}
        run: benchmarks/scripts/emr_submit.sh

      - name: Capture run end timestamp
        if: always()
        run: echo "RUN_END=$(date -u +%Y-%m-%dT%H:%M:%S)" >> "$GITHUB_ENV"

      - name: Teardown EMR
        if: always()
        run: benchmarks/scripts/emr_teardown.sh

      - name: Wait for merges to settle
        if: ${{ !cancelled() && steps.submit.outcome == 'success' }}
        # Polls active part count on the target until it stops dropping,
        # then exports the wall-clock timestamp as SETTLE_END plus the
        # delta from RUN_END as SETTLE_SECONDS.
        env:
          TARGET_CH_HOST: ${{ secrets.CLICKBENCH_TARGET_CH_HOST }}
          TARGET_CH_USER: ${{ secrets.CLICKBENCH_TARGET_CH_USER }}
          TARGET_CH_PASSWORD: ${{ secrets.CLICKBENCH_TARGET_CH_PASSWORD }}
          CH_DATABASE: clickbench
          CH_TABLE: hits
        run: |
          SETTLE_END=$(benchmarks/scripts/wait_for_settle.py)
          echo "SETTLE_END=$SETTLE_END" >> "$GITHUB_ENV"
          SETTLE_SECONDS=$(( $(date -u -d "$SETTLE_END" +%s) - $(date -u -d "$RUN_END" +%s) ))
          echo "SETTLE_SECONDS=$SETTLE_SECONDS" >> "$GITHUB_ENV"
          echo "settle took ${SETTLE_SECONDS}s (RUN_END=$RUN_END SETTLE_END=$SETTLE_END)"

      - name: Insert run record
        if: ${{ !cancelled() && steps.submit.outcome == 'success' }}
        env:
          METRICS_CH_HOST: ${{ secrets.CLICKBENCH_METRICS_CH_HOST }}
          METRICS_CH_USER: ${{ secrets.CLICKBENCH_METRICS_CH_USER }}
          METRICS_CH_PASSWORD: ${{ secrets.CLICKBENCH_METRICS_CH_PASSWORD }}
          TARGET_CH_HOST: ${{ secrets.CLICKBENCH_TARGET_CH_HOST }}
          TARGET_CH_USER: ${{ secrets.CLICKBENCH_TARGET_CH_USER }}
          TARGET_CH_PASSWORD: ${{ secrets.CLICKBENCH_TARGET_CH_PASSWORD }}
          GIT_SHA: ${{ github.sha }}
        run: |
          export CONNECTOR_VERSION=$(cat version.txt)
          python benchmarks/scripts/insert_run_record.py

      - name: Capture metrics — Spark event log + CH query_log/metric_log/part_log
        if: ${{ !cancelled() && steps.submit.outcome == 'success' }}
        # Runs every parser. Order matters only for 04→15: 04 creates the
        # perf.ch_inserts side table, 15 populates it. The other parsers are
        # independent INSERTs into perf.metrics.
        env:
          METRICS_CH_HOST: ${{ secrets.CLICKBENCH_METRICS_CH_HOST }}
          METRICS_CH_USER: ${{ secrets.CLICKBENCH_METRICS_CH_USER }}
          METRICS_CH_PASSWORD: ${{ secrets.CLICKBENCH_METRICS_CH_PASSWORD }}
          TARGET_CH_HOST: ${{ secrets.CLICKBENCH_TARGET_CH_HOST }}
          TARGET_CH_USER: ${{ secrets.CLICKBENCH_TARGET_CH_USER }}
          TARGET_CH_PASSWORD: ${{ secrets.CLICKBENCH_TARGET_CH_PASSWORD }}
          CH_DATABASE: clickbench
          CH_TABLE: hits
        run: |
          for sql in \
            benchmarks/sql/perf/10_insert_from_event_log.sql \
            benchmarks/sql/perf/11_insert_from_query_log.sql \
            benchmarks/sql/perf/12_insert_from_metric_log.sql \
            benchmarks/sql/perf/13_insert_from_part_log.sql \
            benchmarks/sql/perf/14_insert_settle_seconds.sql \
            benchmarks/sql/perf/15_capture_raw_inserts.sql \
            benchmarks/sql/perf/16_insert_throttling.sql
          do
            echo "=== $sql ==="
            python benchmarks/scripts/run_metrics_sql.py "$sql"
          done

      - name: Export metrics to DWH bucket
        if: ${{ !cancelled() && steps.submit.outcome == 'success' }}
        # Assumes the cross-account write role (clickbench-load-test-ci is a
        # trusted principal) and has ClickHouse stream perf.runs/metrics/
        # ch_inserts for this run to the DWH bucket as Parquet. The DWH side
        # ingests the files (s3queue).
        env:
          METRICS_CH_HOST: ${{ secrets.CLICKBENCH_METRICS_CH_HOST }}
          METRICS_CH_USER: ${{ secrets.CLICKBENCH_METRICS_CH_USER }}
          METRICS_CH_PASSWORD: ${{ secrets.CLICKBENCH_METRICS_CH_PASSWORD }}
          DWH_ROLE_ARN: ${{ secrets.CLICKBENCH_DWH_ROLE_ARN }}
        run: python benchmarks/scripts/export_metrics_to_dwh.py
