name: "Publish Release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
  push:
    tags:
      - 'v*'

jobs:
  publish-release:
    if: ${{ startsWith(github.repository, 'clickhouse/') }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        scala: [ '2.12', '2.13' ]
        spark: [ '3.3', '3.4', '3.5', '4.0' ]
        exclude:
          # Spark 4.0 only supports Scala 2.13
          - spark: '4.0'
            scala: '2.12'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle
      - name: Publish Release
        env:
          NMCP_USERNAME: ${{ secrets.NMCP_USERNAME }}
          NMCP_PASSWORD: ${{ secrets.NMCP_PASSWORD }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: >-
          ./gradlew clean publishAllPublicationsToCentralPortal
          -Dscala_binary_version=${{ matrix.scala }}
          -Dspark_binary_version=${{ matrix.spark }}
          -Prelease

  dispatch-glue-build:
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.WORKFLOW_AUTH_PUBLIC_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTH_PUBLIC_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "spark-clickhouse-connector,clickhouse-glue"

      - name: Dispatch spark-release to clickhouse-glue
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          gh api repos/ClickHouse/clickhouse-glue/dispatches \
            -f event_type=spark-release \
            -F client_payload[version]="$VERSION"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
