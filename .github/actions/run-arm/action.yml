# Two-arm nightly protocol (plan §2, task #13): ONE arm of a nightly H/P pair.
# Called TWICE from the load-test job on the SAME provisioned EMR cluster — once
# for arm 'head' (HEAD shadowJar) and once for arm 'pinned' (frozen Maven jar),
# order alternating by day-of-year parity. The two calls share $GITHUB_ENV,
# $RUNNER_TEMP and the checkout because they run in the same job on the same
# runner, so CLUSTER_ID / pair-level env pass with zero plumbing.
#
# This composite owns the PER-ARM body: warm-up -> truncate -> covariates ->
# submit -> settle -> capture -> flags -> run-record -> rollback -> export ->
# integrity. Everything once-per-pair (build/fetch jars, compute pair id, resolve
# arm order, provision, teardown, pair-level run_cost_usd, final truncate) stays
# inline in the workflow.
#
# OUTCOME-CLASS INVARIANT (task #6). A run has an OUTCOME CLASS — 'success' (Spark
# submit succeeded) or 'failed' (submit failed) — recorded as runtime['outcome'].
# Capture, the flag decision, the run record and the DWH export all run in BOTH
# classes, so a failed run is a FIRST-CLASS, MARKED artifact rather than silently
# absent (killing the survivorship bias in plan §6.5/§10). A success-class run
# captures the full metric-family set; a failed-class run captures the CH-side
# families that do not require a successful ingest (event-log and integrity are
# tolerated / integrity-verification is skipped — it is 'integrity_unverified' by
# definition, contract §1.3). Rollback means "artifact INCOMPLETE FOR ITS CLASS"
# (capture/flags/run_record broke, partial rows) — NOT "the run failed"; a
# complete failed-class artifact is KEPT. See the per-step comments for the gates
# and the per-SQL decision matrix (in the capture step).
#
# WHY EVERY SECRET IS AN INPUT: composite-action `run:` steps cannot read the
# `secrets.*` context. Every secret the moved steps use is therefore threaded in
# as an input and re-exported to $GITHUB_ENV / step env here. Non-secret job-level
# `env:` values (BATCH_SIZE, ASYNC_INSERT, EMR_*, CH_DATABASE, DEFAULT_*, SOURCE_*,
# CONNECTOR, RUN_PROFILE, ...) are real environment variables in the job and are
# visible to these steps as `$VAR` without threading.
#
# ARM-SCOPING (the correctness spine): the first step rewrites RUN_ID and every
# arm-scoped variable (event-log URIs, parallelism sidecar, settle status file,
# and — critically — the RUN_START/RUN_END/SETTLE_END time windows) into
# $GITHUB_ENV. Because $GITHUB_ENV persists across steps in the one job, arm 2
# MUST overwrite everything arm 1 wrote; this step does exactly that (including
# clearing arm 1's FLAGGED/FLAG_REASON so a clean arm 2 never inherits arm 1's
# flag). CH-side capture SQL is TIME-WINDOWED (11/12/13/15/16/17/18/20 window
# system.*_log by run_start/run_end/settle_end), so per-arm windows are what stop
# arm P's server metrics from double-counting arm H.

name: "Run one benchmark arm"
description: "Warm-up, truncate, ingest, settle, capture and record one H/P arm on the shared EMR cluster."

inputs:
  arm:
    description: "Which build this arm runs: 'head' or 'pinned'."
    required: true
  tier:
    description: >-
      Benchmark tier as a string: '1' (default) = saturated Cloud ingest, the
      byte-identical-to-today path; '0' = Null-engine connector ceiling against
      the Docker ClickHouse on the EMR master (Tier 0, plan §3). The workflow
      calls this action 4x per pair: (arm1,t0)(arm1,t1)(arm2,t0)(arm2,t1).
    required: false
    default: "1"
  # --- secrets threaded from the calling job (composite run: cannot read secrets.*) ---
  target_ch_host:
    required: true
  target_ch_port:
    required: true
  target_ch_user:
    required: true
  target_ch_password:
    required: true
  metrics_ch_host:
    required: true
  metrics_ch_user:
    required: true
  metrics_ch_password:
    required: true
  dwh_role_arn:
    required: true
  s3_bucket:
    description: "CI S3 bucket (per-arm event-log + parallelism sidecar prefixes)."
    required: true
  # --- Tier-0-only inputs (ignored on tier='1') ---------------------------------
  tier0_master_ip:
    description: "Tier 0 only: EMR master PRIVATE IP the t0 ingest targets over HTTP (from the bootstrap sidecar). Empty on tier='1'."
    required: false
    default: ""
  tier0_ch_version:
    description: "Tier 0 only: pinned Docker-CH version (contract §1.4 tier0_ch_version). Empty on tier='1'."
    required: false
    default: ""
  metrics_secret_id:
    description: "Tier 0 only: Secrets Manager id for the METRICS-service password, read on the master by the on-master capture step. Empty on tier='1'."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: "Set arm-scoped identity, windows and env (arm ${{ inputs.arm }} tier ${{ inputs.tier }})"
      shell: bash
      env:
        ARM: ${{ inputs.arm }}
        TIER: ${{ inputs.tier }}
        S3_BUCKET: ${{ inputs.s3_bucket }}
      run: |
        set -euo pipefail
        # pair_id is the pair-level RUN_ID (top-level literal, never overwritten).
        # Per-row run_id = <pair_id>-<arm>-t<tier> (contract §1.2). tier is '0' or
        # '1'; the four calls in a pair produce four distinct run_ids sharing the
        # pair_id.
        ARM_RUN_ID="${PAIR_ID}-${ARM}-t${TIER}"
        echo "arm=$ARM  tier=$TIER  pair_id=$PAIR_ID  arm_run_id=$ARM_RUN_ID"
        {
          echo "ARM=$ARM"
          echo "TIER=$TIER"
          echo "ARM_RUN_ID=$ARM_RUN_ID"
          # RUN_ID drives every RUN_ID-env-driven script (insert_run_record,
          # run_metrics_sql {run_id}, rollback, read_task_failed_count, export,
          # check_integrity, compute_run_cost). Overwriting the pair-level RUN_ID
          # here does NOT corrupt the top-level JAR/SCRIPT/PARALLELISM literals —
          # those were fully expanded into $GITHUB_ENV before this arm ran.
          echo "RUN_ID=$ARM_RUN_ID"
          # Per-arm event-log prefix: two Spark apps must not share a glob (SQL 10).
          # EMR 7.13 ships Spark 3.5.6, which writes a single flat event-log file
          # (application_<appId>_1) — rolling format (eventlog_v2_*/) is Spark
          # 4.0+ only. Match the flat file; if we ever move to a Spark-4 EMR
          # release, switch this glob to eventlog_v2_*/events_*.
          echo "EVENT_LOG_DIR_SPARK=s3a://${S3_BUCKET}/spark-event-logs/${ARM_RUN_ID}/"
          echo "EVENT_LOG_URI=s3://${S3_BUCKET}/spark-event-logs/${ARM_RUN_ID}/application_*"
          # Per-arm observed-parallelism sidecar (run-meta keyed by arm run id).
          echo "WRITE_PARALLELISM_META_S3_URI=s3://${S3_BUCKET}/run-meta/${ARM_RUN_ID}/write_parallelism"
          # Per-arm settle status sidecar — arm 2 must not read arm 1's flag.
          echo "SETTLE_STATUS_FILE=${RUNNER_TEMP}/settle_status_${ARM}"
          # Reset the per-arm time windows and settle scalars written by a prior
          # arm so nothing leaks from arm 1 into arm 2 (they are re-set below).
          # GITHUB_ENV can only SET a variable (possibly to empty), never unset
          # it — so the numeric settle scalars reset to "0", not "":
          # run_metrics_sql.py float()s them and a present-but-empty value would
          # crash every capture invocation (float('') ValueError).
          echo "RUN_START="
          echo "RUN_END="
          echo "SETTLE_END="
          echo "SETTLE_SECONDS=0"
          echo "SETTLE_TIMED_OUT=0"
          # Reset flags: flagged is present-iff-tripped; a clean arm 2 must not
          # inherit arm 1's flag (contract §1.3).
          echo "FLAGGED="
          echo "FLAG_REASON="
          # Reset the warm-up marker: warm_up is present-iff the arm's own priming
          # ran (contract §1.4). continue-on-error means a FAILED arm-2 warm-up
          # never rewrites this, so it MUST start empty or arm 2 would inherit
          # arm 1's marker and falsely tag runtime['warm_up'].
          echo "WARMUP_WORKLOAD="
        } >> "$GITHUB_ENV"
        # Per-arm connector provenance (recorded on the arm's perf.runs row).
        if [ "$ARM" = "head" ]; then
          echo "CONNECTOR_VERSION=$(cat version.txt)" >> "$GITHUB_ENV"
          echo "ARM_GIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "ARM_JAR_S3_URI=${JAR_S3_URI}" >> "$GITHUB_ENV"
        else
          echo "CONNECTOR_VERSION=${PINNED_CONNECTOR_VERSION}" >> "$GITHUB_ENV"
          echo "ARM_GIT_SHA=${PINNED_GIT_SHA}" >> "$GITHUB_ENV"
          echo "ARM_JAR_S3_URI=${PINNED_JAR_S3_URI}" >> "$GITHUB_ENV"
        fi

    - name: "Warm-up insert (arm ${{ inputs.arm }}, unparsed event-log prefix)"
      # Priming insert on the arm's own jar, BEFORE truncate (truncate at the next
      # step wipes it). Failure only forfeits priming, so continue-on-error. Its
      # event logs go to a throwaway 'warmup/' prefix that SQL 10 never globs, and
      # it reuses emr_submit.sh with a fixed single-file source + a warmup STEP_NAME.
      # WARMUP_WORKLOAD gates runtime['warm_up'] (contract §1.4: present iff it
      # ran; the value identifies the workload — derived from the glob basename).
      # TIER 0 SKIPS warm-up (spec Q3): a Null target has no merge/storage state
      # to prime, and t0 emits no runtime['warm_up'] key.
      if: ${{ inputs.tier == '1' }}
      id: warmup
      shell: bash
      continue-on-error: true
      env:
        CH_HOST: ${{ inputs.target_ch_host }}
        CH_PORT: ${{ inputs.target_ch_port }}
        CH_PROTOCOL: https
        CH_USER: ${{ inputs.target_ch_user }}
        S3_BUCKET: ${{ inputs.s3_bucket }}
      run: |
        set -euo pipefail
        WARMUP_PARQUET_GLOB="${WARMUP_PARQUET_GLOB:-s3a://clickhouse-public-datasets/hits_compatible/athena_partitioned/hits_0.parquet}"
        echo "warm-up (arm $ARM): priming with $WARMUP_PARQUET_GLOB"
        INPUT_PARQUET_GLOB="$WARMUP_PARQUET_GLOB" \
        JAR_S3_URI="$ARM_JAR_S3_URI" \
        STEP_NAME="ClickBenchWarmup-$ARM" \
        EVENT_LOG_DIR_SPARK="s3a://${S3_BUCKET}/spark-event-logs/warmup/${ARM_RUN_ID}/" \
        WRITE_PARALLELISM_META_S3_URI="" \
          benchmarks/scripts/emr_submit.sh
        # Only reached on success (set -e) — record WHICH workload primed this arm
        # (glob basename, e.g. 'hits_0') so the run-record step can tag
        # runtime['warm_up'] with it (contract §1.4: the value identifies the
        # warm-up workload, never a hardcoded literal).
        echo "WARMUP_WORKLOAD=$(basename "$WARMUP_PARQUET_GLOB" .parquet)" >> "$GITHUB_ENV"

    - name: "Truncate target table (arm ${{ inputs.arm }})"
      # TIER 0 SKIPS truncate (spec Q3): ENGINE=Null holds no rows/parts.
      if: ${{ inputs.tier == '1' }}
      shell: bash
      env:
        TARGET_CH_HOST: ${{ inputs.target_ch_host }}
        TARGET_CH_USER: ${{ inputs.target_ch_user }}
        TARGET_CH_PASSWORD: ${{ inputs.target_ch_password }}
        CH_DATABASE: clickbench
        CH_TABLE: hits
        SKIP_TRUNCATE: ${{ vars.SKIP_TRUNCATE || '0' }}
      run: python benchmarks/scripts/truncate_target.py

    - name: "Capture pre-run server covariates (arm ${{ inputs.arm }})"
      # MOVED post-truncate (task #13 decision): under two arms a pre-truncate
      # reading would show the prior arm's just-settled parts and false-flag
      # pre_run_active_parts every night; post-truncate keeps it a valid ~0
      # cleanliness verifier for both arms. ch_uptime/pre_run_rss are unaffected.
      # Best-effort covariate — does not participate in capture/rollback gating.
      # TIER 0 SKIPS pre-run covariates (spec Q3): they read the Cloud TARGET
      # service (SQL 21), which is not the t0 target (the Docker Null CH).
      if: ${{ inputs.tier == '1' }}
      shell: bash
      continue-on-error: true
      env:
        METRICS_CH_HOST: ${{ inputs.metrics_ch_host }}
        METRICS_CH_USER: ${{ inputs.metrics_ch_user }}
        METRICS_CH_PASSWORD: ${{ inputs.metrics_ch_password }}
        TARGET_CH_HOST: ${{ inputs.target_ch_host }}
        TARGET_CH_USER: ${{ inputs.target_ch_user }}
        TARGET_CH_PASSWORD: ${{ inputs.target_ch_password }}
      run: python benchmarks/scripts/run_metrics_sql.py benchmarks/sql/perf/21_pre_run_covariates.sql

    - name: "Record arm RUN_START (arm ${{ inputs.arm }})"
      shell: bash
      run: echo "RUN_START=$(date -u +%Y-%m-%dT%H:%M:%S)" >> "$GITHUB_ENV"

    - name: "Submit Spark step (arm ${{ inputs.arm }} tier ${{ inputs.tier }})"
      id: submit
      shell: bash
      # TIER-CONDITIONAL TARGET (spec Q3): the workload (jar, INPUT_PARQUET_GLOB,
      # batch_size, async_insert) is IDENTICAL across tiers; only the target
      # differs. Tier 1 -> the Cloud service over HTTPS (secret-resolved
      # password, database clickbench). Tier 0 -> the Docker Null CH on the
      # master over HTTP at its PRIVATE IP:8123, database tier0, DEFAULT USER,
      # EMPTY password. CH_SECRET_ID is forced empty for t0 so clickbench_ingest
      # resolve_password falls through to the (empty) CH_PASSWORD instead of
      # trying Secrets Manager (verified: an empty CH_SECRET_ID is falsy, and
      # CH_PASSWORD="" is returned verbatim for a passwordless local CH).
      env:
        CH_HOST: ${{ inputs.tier == '0' && inputs.tier0_master_ip || inputs.target_ch_host }}
        CH_PORT: ${{ inputs.tier == '0' && '8123' || inputs.target_ch_port }}
        CH_PROTOCOL: ${{ inputs.tier == '0' && 'http' || 'https' }}
        CH_USER: ${{ inputs.tier == '0' && 'default' || inputs.target_ch_user }}
        CH_DATABASE: ${{ inputs.tier == '0' && 'tier0' || 'clickbench' }}
        CH_TABLE: hits
      run: |
        set -euo pipefail
        # t0: force CH_SECRET_ID empty so emr_submit forwards an empty value and
        # clickbench_ingest.resolve_password falls through to CH_PASSWORD (empty
        # for the passwordless Docker CH). t1: keep the inherited job-env
        # CH_SECRET_ID (Secrets-Manager-resolved Cloud password). Exported here
        # (not step env) to avoid an empty-context edge in the env expression.
        if [ "${{ inputs.tier }}" = "0" ]; then
          export CH_SECRET_ID=""
          export CH_PASSWORD=""
        fi
        # Arm's own jar + arm event-log dir (both from the arm-scoped env above).
        # BATCH_SIZE / ASYNC_INSERT / WRITE_PARALLELISM_META_S3_URI come from the
        # job env; STEP_NAME tags the EMR step per arm.
        JAR_S3_URI="$ARM_JAR_S3_URI" \
        STEP_NAME="ClickBenchIngest-$ARM" \
          benchmarks/scripts/emr_submit.sh

    - name: "Capture run end timestamp (arm ${{ inputs.arm }})"
      if: always()
      shell: bash
      run: echo "RUN_END=$(date -u +%Y-%m-%dT%H:%M:%S)" >> "$GITHUB_ENV"

    - name: "Wait for merges to settle (arm ${{ inputs.arm }})"
      # TIER 0 SKIPS settle (spec Q3): ENGINE=Null creates no parts, so there is
      # nothing to merge/settle. SETTLE_* stay reset to 0 (settle_timeout cannot
      # trip on t0). Gated on tier='1' AND submit success.
      if: ${{ !cancelled() && inputs.tier == '1' && steps.submit.outcome == 'success' }}
      shell: bash
      env:
        TARGET_CH_HOST: ${{ inputs.target_ch_host }}
        TARGET_CH_USER: ${{ inputs.target_ch_user }}
        TARGET_CH_PASSWORD: ${{ inputs.target_ch_password }}
        CH_DATABASE: clickbench
        CH_TABLE: hits
      run: |
        # wait_for_settle prints only the settle-end timestamp on stdout; the
        # 1/0 timed-out flag comes back via the sidecar status file (its stdout
        # contract can't carry a second value). See plan §6.4. SETTLE_STATUS_FILE
        # is the ARM-scoped sidecar set in the first step.
        SETTLE_END=$(benchmarks/scripts/wait_for_settle.py)
        echo "SETTLE_END=$SETTLE_END" >> "$GITHUB_ENV"
        SETTLE_SECONDS=$(( $(date -u -d "$SETTLE_END" +%s) - $(date -u -d "$RUN_END" +%s) ))
        echo "SETTLE_SECONDS=$SETTLE_SECONDS" >> "$GITHUB_ENV"
        SETTLE_TIMED_OUT=$(cat "$SETTLE_STATUS_FILE" 2>/dev/null || echo 0)
        echo "SETTLE_TIMED_OUT=$SETTLE_TIMED_OUT" >> "$GITHUB_ENV"
        echo "settle took ${SETTLE_SECONDS}s, timed_out=${SETTLE_TIMED_OUT} (RUN_END=$RUN_END SETTLE_END=$SETTLE_END)"

    - name: "Capture metrics (arm ${{ inputs.arm }})"
      id: capture
      # OUTCOME-CLASS CAPTURE (task #6). Runs in BOTH outcome classes — not gated
      # on submit success — so a FAILED run still lands its CH-side telemetry (the
      # most informative runs are the least observed; plan §6.5, §10). !cancelled()
      # only skips a user/timeout cancellation. The submit outcome is threaded in
      # as SUBMIT_OUTCOME and selects the per-SQL family list below.
      #
      # ROLLBACK INVARIANT (redefined, task #6 directive 1): a run is COMPLETE FOR
      # ITS OUTCOME CLASS. A success-class run captures the full family set; a
      # failed-class run captures the CH-side families that do NOT require a
      # successful ingest, and is a COMPLETE artifact at that reduced set — it must
      # NOT be rolled back merely for being failed. Rollback still fires only when
      # capture itself BREAKS (partial rows) — this step exits non-zero.
      #
      # PER-SQL DECISION MATRIX (which families run per class, and why):
      #   file  metric family            success  failed   rationale
      #   10  event_log (Spark)            yes    tolerant the event log may be
      #         absent/partial on a failed submit; on the failed path a missing/
      #         unreadable log is TOLERATED (|| true) — capture what exists, never
      #         fail the class over it (directive 3). On success it is strict.
      #   11  query_log (CH insert CPU)    yes     yes    server-side; time-windowed
      #         on run_start..run_end — valid for whatever inserts landed before the
      #         failure. Empty window => aggregates are 0/NULL, not an error.
      #   12  metric_log (conns/merge)     yes     yes    server-side, windowed.
      #   13  part_log (parts/merge amp)   yes     yes    server-side, windowed.
      #   14  settle_seconds               yes     yes    literal from SETTLE_SECONDS
      #         (reset to 0 when settle was skipped) — records 0, not an error.
      #   15  raw inserts -> ch_inserts    yes     yes    server-side, windowed.
      #   16  throttling                   yes     yes    server-side, windowed.
      #   17  memory peaks                 yes     yes    server-side, windowed.
      #   18  derived (bytes/wire per row) yes     yes    server-side, windowed.
      #   19  rate stability               yes     yes    reads perf.ch_inserts (15
      #         ran just above); HAVING count()>=2 => omitted, never errors.
      #   20  integrity                    yes    tolerant needs a SUCCESSFUL ingest:
      #         on a failed-class run the load is partial by definition, so the run
      #         is 'integrity_unverified' (contract §1.3) and the integrity CHECK
      #         step is skipped (below). The dedup-context half (ch_dedup_dropped_
      #         blocks) is not separable from the same INSERT, so on the failed path
      #         the whole file is TOLERATED (|| true): if it runs it lands context
      #         rows, if it errors it does not fail the class. It is NEVER allowed
      #         to fail the run on the failed path (directive 3).
      #   22  settle_timed_out             yes     yes    literal from SETTLE_TIMED_OUT
      #         (reset to 0 when settle was skipped) — records 0, not an error.
      # (21 pre-run covariates runs earlier, pre-submit, in its own step.)
      #
      # run_cost_usd is NOT captured here: it is a PAIR-level metric recorded once,
      # top-level in the workflow after "Teardown EMR", onto the first-run arm's row
      # (contract §2.1 amendment).
      #
      # SKIPPED-SUBMIT GATE (spec Q7): also require submit.outcome != 'skipped'. A
      # submit that never ran (e.g. a prior arm-scoped step short-circuited it)
      # must NOT manufacture a failed-class artifact out of an empty window — the
      # whole capture->flags->run_record chain then skips, leaving no partial row.
      # (A submit that ran-and-failed has outcome 'failure', not 'skipped', and
      # still lands its marked failed-class artifact.)
      if: ${{ !cancelled() && steps.submit.outcome != 'skipped' }}
      shell: bash
      env:
        SUBMIT_OUTCOME: ${{ steps.submit.outcome }}
        METRICS_CH_HOST: ${{ inputs.metrics_ch_host }}
        METRICS_CH_USER: ${{ inputs.metrics_ch_user }}
        METRICS_CH_PASSWORD: ${{ inputs.metrics_ch_password }}
        TARGET_CH_HOST: ${{ inputs.target_ch_host }}
        TARGET_CH_USER: ${{ inputs.target_ch_user }}
        TARGET_CH_PASSWORD: ${{ inputs.target_ch_password }}
        CH_DATABASE: clickbench
        CH_TABLE: hits
      run: |
        set -euo pipefail
        # Order within the loop is irrelevant EXCEPT that 15 must precede 19 (19
        # reads the perf.ch_inserts rows 15 writes); the numeric order preserves
        # that. Everything else is independent INSERTs into perf.metrics /
        # perf.ch_inserts (tables exist from the bootstrap step).
        #
        # STRICT vs TOLERANT: STRICT files fail the step (=> rollback) on error —
        # a partial-rows break must not silently produce an incomplete artifact.
        # TOLERANT files (10 event log, 20 integrity) only apply on the FAILED
        # class, where the underlying data is expected to be absent/partial; there
        # they are wrapped in `|| true` so their absence does not fail the class.
        run_sql () { echo "=== $1 ==="; python benchmarks/scripts/run_metrics_sql.py "$1"; }
        run_sql_tolerant () {
          echo "=== $1 (tolerant: failed-class) ==="
          python benchmarks/scripts/run_metrics_sql.py "$1" || \
            echo "NOTE: $1 produced no rows on the failed-class run (tolerated)"
        }
        # ------------------------------------------------------------------ #
        # TIER 0 CAPTURE (spec Q3/Q5): runner-side is EVENT-LOG ONLY — the
        # tier0 variant of SQL 10 (null_rows_per_sec / null_mb_per_sec renames),
        # windowed by the t0 run_id's own EVENT_LOG_URI. The perf/1x server-side
        # families are SKIPPED here: they read the CLOUD target via remoteSecure,
        # which is NOT the t0 target (the Docker Null CH). The t0 server-side set
        # (connections_per_insert, bytes_on_wire_per_row, ch_insert_cpu_share_tier0)
        # is captured by the SEPARATE on-master EMR step, against the Docker CH,
        # before teardown. Same STRICT-on-success / TOLERANT-on-failed rule as
        # file 10 in Tier 1. No integrity (no delivered rows on a Null target),
        # no settle files, no ch_inserts/throttling/memory.
        if [ "${{ inputs.tier }}" = "0" ]; then
          if [ "${SUBMIT_OUTCOME}" = "success" ]; then
            echo "capture: TIER 0 success-class — event-log only (strict)"
            run_sql benchmarks/sql/tier0/10_event_log_tier0.sql
          else
            echo "capture: TIER 0 failed-class — event-log only (tolerant)"
            run_sql_tolerant benchmarks/sql/tier0/10_event_log_tier0.sql
          fi
          exit 0
        fi
        # ------------------------------------------------------------------ #
        # Server-side families run in BOTH classes (windowed system.*_log reads).
        COMMON_STRICT=" \
          benchmarks/sql/perf/11_insert_from_query_log.sql \
          benchmarks/sql/perf/12_insert_from_metric_log.sql \
          benchmarks/sql/perf/13_insert_from_part_log.sql \
          benchmarks/sql/perf/14_insert_settle_seconds.sql \
          benchmarks/sql/perf/15_capture_raw_inserts.sql \
          benchmarks/sql/perf/16_insert_throttling.sql \
          benchmarks/sql/perf/17_insert_memory_peaks.sql \
          benchmarks/sql/perf/18_insert_derived_metrics.sql \
          benchmarks/sql/perf/19_insert_rate_stability.sql \
          benchmarks/sql/perf/22_insert_settle_timed_out.sql"
        if [ "${SUBMIT_OUTCOME}" = "success" ]; then
          echo "capture: success-class — full family set (strict)"
          # 10 (event log) + 20 (integrity) are STRICT here: on a successful
          # ingest their inputs exist, and a partial write of these rows must
          # roll the run back like any other capture break.
          run_sql benchmarks/sql/perf/10_insert_from_event_log.sql
          for sql in $COMMON_STRICT; do run_sql "$sql"; done
          run_sql benchmarks/sql/perf/20_insert_integrity.sql
        else
          echo "capture: failed-class (submit outcome='${SUBMIT_OUTCOME}') — CH-side families + tolerant event-log/integrity"
          # 10 (event log) is TOLERATED: a failed submit may leave no/partial log.
          run_sql_tolerant benchmarks/sql/perf/10_insert_from_event_log.sql
          for sql in $COMMON_STRICT; do run_sql "$sql"; done
          # 20 (integrity) is TOLERATED and its VERDICT step is skipped for this
          # class (integrity_unverified by definition — a partial load has no
          # meaningful rows_delivered==rows_expected comparison).
          run_sql_tolerant benchmarks/sql/perf/20_insert_integrity.sql
        fi

    - name: "Capture Tier-0 server-side metrics on the master (arm ${{ inputs.arm }})"
      id: capture_onmaster
      # TIER 0 ONLY (spec Q1/Q3): before teardown, run the on-master EMR step that
      # reads the Docker Null CH's system.query_log/metric_log (windowed to this
      # t0 pass) and ships connections_per_insert / bytes_on_wire_per_row /
      # ch_insert_cpu_share_tier0 to the Cloud metrics service. This is the
      # server-side half of t0 capture (the runner-side event-log half ran in the
      # capture step). Part of the capture phase for the #6 rollback gate: a break
      # here is a failure output and the rollback step below wipes this t0 run_id.
      # Gated on tier=='0' AND submit success (a never-ran/failed t0 submit means
      # the Docker CH has no windowed inserts to read — but we still allow it to
      # run and record 0s? No: only run when submit succeeded, else the window is
      # empty by construction and the on-master step would ship all-zero rows.
      # Empty-window rows are harmless 0s, but skipping keeps a failed t0 artifact
      # to the event-log-only reduced set, symmetric with the perf/1x skip).
      if: ${{ !cancelled() && inputs.tier == '0' && steps.submit.outcome == 'success' }}
      shell: bash
      env:
        S3_BUCKET: ${{ inputs.s3_bucket }}
        METRICS_CH_HOST: ${{ inputs.metrics_ch_host }}
        METRICS_CH_USER: ${{ inputs.metrics_ch_user }}
        METRICS_SECRET_ID: ${{ inputs.metrics_secret_id }}
      run: |
        set -euo pipefail
        # Tier-0 assets are staged once per pair to s3://<bucket>/tier0/<pair_id>/
        # by the workflow's upload step (bootstrap script, DDL, capture script,
        # server-side SQL). The EMR step s3-cp's them to the master and runs the
        # capture. Passed via appMasterEnv-style env on command-runner.jar: the
        # metrics HOST/USER are non-secret; the PASSWORD is resolved on the master
        # from Secrets Manager (METRICS_SECRET_ID) — NEVER a plaintext step arg.
        ASSETS_S3="s3://${S3_BUCKET}/tier0/${PAIR_ID}"
        # Build the remote command. RUN_ID/RUN_START/RUN_END are the t0 pass's
        # arm-scoped values (already in $GITHUB_ENV / this shell's env). Values are
        # single-quoted into the remote bash -c so they are literal on the master.
        REMOTE_CMD="set -euo pipefail; \
          mkdir -p /tmp/tier0/sql; \
          aws s3 cp '${ASSETS_S3}/capture_tier0_onmaster.sh' /tmp/tier0/capture_tier0_onmaster.sh; \
          aws s3 cp '${ASSETS_S3}/12_server_side_tier0.sql' /tmp/tier0/sql/12_server_side_tier0.sql; \
          chmod +x /tmp/tier0/capture_tier0_onmaster.sh; \
          RUN_ID='${RUN_ID}' RUN_START='${RUN_START}' RUN_END='${RUN_END}' \
          METRICS_CH_HOST='${METRICS_CH_HOST}' METRICS_CH_USER='${METRICS_CH_USER}' \
          METRICS_SECRET_ID='${METRICS_SECRET_ID}' AWS_REGION='${AWS_REGION}' \
          TIER0_SERVER_SQL='/tmp/tier0/sql/12_server_side_tier0.sql' \
          bash /tmp/tier0/capture_tier0_onmaster.sh"
        STEP_ID=$(aws emr add-steps --region "$AWS_REGION" --cluster-id "$CLUSTER_ID" \
          --steps "$(jq -nc --arg cmd "$REMOTE_CMD" '[{
            Type:"CUSTOM_JAR", Jar:"command-runner.jar",
            Name:"Tier0Capture-'"${ARM}"'",
            ActionOnFailure:"CONTINUE",
            Args:["bash","-c",$cmd]}]')" \
          --query 'StepIds[0]' --output text)
        echo "submitted on-master t0 capture step $STEP_ID, waiting..."
        aws emr wait step-complete --region "$AWS_REGION" --cluster-id "$CLUSTER_ID" --step-id "$STEP_ID"
        STATE=$(aws emr describe-step --region "$AWS_REGION" --cluster-id "$CLUSTER_ID" --step-id "$STEP_ID" \
          --query 'Step.Status.State' --output text)
        echo "on-master t0 capture final state: $STATE"
        test "$STATE" = "COMPLETED"

    - name: "Decide validity-guard flags (arm ${{ inputs.arm }})"
      id: flags
      # Runs in BOTH outcome classes (task #6): gated on capture success, NOT on
      # submit success. flagged/flag_reason are the validity-guard semantics
      # (contract §1.3) and stay SEPARATE from the outcome class — a failed-class
      # run is NOT merely "flagged" (contract §3): its outcome='failed' is set on
      # the run record, while flagged is present only if a guard (task_retries /
      # settle_timeout) also tripped. On the failed class settle was skipped
      # (settle_timeout cannot trip) and task_failed_count may be absent (10 was
      # tolerated) => read_task_failed_count.py returns 0 => typically no flag,
      # which is correct: the run is failed, not flagged.
      if: ${{ !cancelled() && steps.capture.outcome == 'success' }}
      shell: bash
      env:
        METRICS_CH_HOST: ${{ inputs.metrics_ch_host }}
        METRICS_CH_USER: ${{ inputs.metrics_ch_user }}
        METRICS_CH_PASSWORD: ${{ inputs.metrics_ch_password }}
      run: |
        set -euo pipefail
        TASK_FAILED_COUNT=$(python benchmarks/scripts/read_task_failed_count.py)
        echo "task_failed_count=${TASK_FAILED_COUNT} settle_timed_out=${SETTLE_TIMED_OUT:-0}"
        REASONS=()
        if [ "${TASK_FAILED_COUNT:-0}" -gt 0 ]; then REASONS+=("task_retries"); fi
        if [ "${SETTLE_TIMED_OUT:-0}" != "0" ]; then REASONS+=("settle_timeout"); fi
        if [ "${#REASONS[@]}" -gt 0 ]; then
          FLAG_REASON=$(IFS='|'; echo "${REASONS[*]}")
          echo "FLAGGED=1" >> "$GITHUB_ENV"
          echo "FLAG_REASON=$FLAG_REASON" >> "$GITHUB_ENV"
          echo "run FLAGGED (non-comparable): flag_reason=$FLAG_REASON"
        else
          # Present-iff-tripped: write NEITHER key. The first step already reset
          # FLAGGED/FLAG_REASON, so a clean arm carries neither (never flagged='0').
          echo "run not flagged (no validity guard tripped)"
        fi

    - name: "Insert run record (arm ${{ inputs.arm }})"
      id: run_record
      # OUTCOME-CLASS RECORD (task #6): lands the perf.runs row in BOTH classes so
      # a failed run is a first-class, marked artifact — not silently absent
      # (survivorship bias, plan §6.5). Gated on the FLAGS step's success (which in
      # turn requires capture success): no run record may exist without a flag
      # decision (directive 5b — symmetric with the metrics invariant). NOT gated
      # on submit success. runtime['outcome'] marks the class (below).
      if: ${{ !cancelled() && steps.flags.outcome == 'success' }}
      shell: bash
      env:
        SUBMIT_OUTCOME: ${{ steps.submit.outcome }}
        TIER0_CH_VERSION: ${{ inputs.tier0_ch_version }}
        METRICS_CH_HOST: ${{ inputs.metrics_ch_host }}
        METRICS_CH_USER: ${{ inputs.metrics_ch_user }}
        METRICS_CH_PASSWORD: ${{ inputs.metrics_ch_password }}
        TARGET_CH_HOST: ${{ inputs.target_ch_host }}
        TARGET_CH_USER: ${{ inputs.target_ch_user }}
        TARGET_CH_PASSWORD: ${{ inputs.target_ch_password }}
      run: |
        set -euo pipefail
        # Outcome class (task #6 directive 4). 'success' iff the Spark submit
        # succeeded, else 'failed'. This is SET EXPLICITLY on both paths; dashboards
        # coalesce a MISSING outcome key to 'success' for legacy rows (the pre-task-6
        # rows only ever landed on the success path). That coalesce default is a
        # CONTRACT-AMENDMENT CANDIDATE: 'outcome' is not yet a pinned runtime key in
        # docs/benchmark-v2-contract.md §1.3 — report, do not edit the contract here.
        if [ "${SUBMIT_OUTCOME}" = "success" ]; then RUN_OUTCOME="success"; else RUN_OUTCOME="failed"; fi
        echo "outcome class: $RUN_OUTCOME (submit outcome='${SUBMIT_OUTCOME}')"
        # Per-arm provenance: CONNECTOR_VERSION + ARM_GIT_SHA set in the first
        # step (head: version.txt + github.sha; pinned: PINNED_*). insert_run_record
        # reads GIT_SHA, so map the arm sha onto it here.
        export GIT_SHA="$ARM_GIT_SHA"
        # write_parallelism is the OBSERVED write-stage partition count the ingest
        # job uploaded to the arm's S3 sidecar (record-only — nothing forces it).
        # `|| true` is LOAD-BEARING under `set -euo pipefail`: the sidecar upload
        # is best-effort on the EMR side, and a missing object must fall through
        # to the 'input-splits' token, not fail run-record (which would roll back
        # a fully-captured healthy arm).
        WRITE_PARALLELISM_OBSERVED=$(aws s3 cp "$WRITE_PARALLELISM_META_S3_URI" - 2>/dev/null | tr -cd '0-9' || true)
        WRITE_PARALLELISM_OBSERVED="${WRITE_PARALLELISM_OBSERVED:-input-splits}"
        echo "write_parallelism (observed) = $WRITE_PARALLELISM_OBSERVED"
        # runtime map (contract §1.1/§1.3/§1.4). Two-arm additions: arm, pair_id,
        # compute_region (MANDATORY, contract §1.1 amendment 2026-07-07:
        # cross-region bias must be computable — EMR runs in COMPUTE_REGION,
        # the target service in TARGET_REGION) and warm_up (present iff the
        # arm's warm-up ran/succeeded; value = the workload the warm-up step
        # recorded in WARMUP_WORKLOAD).
        #
        # TIER-CONDITIONAL runtime (spec Q6). On t0 the target is the Docker Null
        # CH ON THE MASTER, so several scope keys are OVERRIDDEN (never inherited):
        #   tier                = '0' (contract §1.1)
        #   environment_class   = 'self_hosted' (NOT the Cloud class; contract §1.1)
        #   target_region       = COMPUTE_REGION (the instrument rides the load
        #                         generator — target region EQUALS compute region;
        #                         MUST NOT inherit the Cloud TARGET_REGION)
        #   partition_scheme    = 'none' (ENGINE=Null has no partitioning)
        #   tier0_ch_version    = the pinned Docker-CH version (MANDATORY on t0)
        #   NO warm_up key      (t0 skips warm-up)
        # batch_size/async_insert/dataset/write_parallelism are the SAME as t1
        # (identical workload). settle_timed_out is 0 on t0 (settle skipped).
        TIER="${TIER:-1}"
        if [ "$TIER" = "0" ]; then
          T0_ENV_CLASS="self_hosted"
          T0_TARGET_REGION="$COMPUTE_REGION"   # instrument on the load generator
          T0_PARTITION_SCHEME="none"
        else
          T0_ENV_CLASS="$ENVIRONMENT_CLASS"
          T0_TARGET_REGION="$TARGET_REGION"
          T0_PARTITION_SCHEME="$PARTITION_SCHEME"
        fi
        export RUNTIME=$(jq -cn --arg sv 3.5 --arg scv 2.12 --arg emr "$EMR_RELEASE_LABEL" \
          --arg it "$EMR_INSTANCE_TYPE" --arg cc "$EMR_CORE_COUNT" \
          --arg sto "${SETTLE_TIMED_OUT:-0}" \
          --arg bs "$BATCH_SIZE" --arg wp "$WRITE_PARALLELISM_OBSERVED" \
          --arg ai "$ASYNC_INSERT" --arg ps "$T0_PARTITION_SCHEME" \
          --arg ds "$DATASET" \
          --arg ec "$T0_ENV_CLASS" --arg tr "$T0_TARGET_REGION" \
          --arg cr "$COMPUTE_REGION" \
          --arg arm "$ARM" --arg pair "$PAIR_ID" \
          --arg tier "$TIER" \
          --arg t0ver "${TIER0_CH_VERSION:-}" \
          --arg outcome "$RUN_OUTCOME" \
          --arg warmup "${WARMUP_WORKLOAD:-}" \
          --arg flagged "${FLAGGED:-}" --arg flag_reason "${FLAG_REASON:-}" \
          '{spark_version: $sv, scala_version: $scv, emr_release: $emr,
            emr_instance_type: $it, emr_core_count: $cc,
            settle_timed_out: $sto,
            batch_size: $bs, write_parallelism: $wp, async_insert: $ai,
            partition_scheme: $ps, dataset: $ds,
            environment_class: $ec, target_region: $tr,
            compute_region: $cr,
            arm: $arm, pair_id: $pair, tier: $tier,
            outcome: $outcome}
           + (if $tier == "0" and $t0ver != "" then {tier0_ch_version: $t0ver} else {} end)
           + (if $tier != "0" and $warmup != "" then {warm_up: $warmup} else {} end)
           + (if $flagged == "1"
              then {flagged: "1", flag_reason: $flag_reason}
              else {} end)')
        python benchmarks/scripts/insert_run_record.py

    - name: "Roll back this arm if it wasn't fully recorded (arm ${{ inputs.arm }})"
      # OUTCOME-CLASS ROLLBACK (task #6 directive 1, redefined invariant): rollback
      # means "the artifact is INCOMPLETE FOR ITS OUTCOME CLASS", NOT "the run
      # failed". It fires in EITHER class — success OR failed — when capture, the
      # flag decision, or the run-record insert BREAKS (partial rows / no flag
      # decision / no run record). It does NOT fire merely because submit failed:
      # a failed-class run whose reduced capture + flags + run record all succeeded
      # is a COMPLETE artifact and is KEPT (marked outcome='failed').
      #
      # It is NOT gated on submit success — that gate is exactly what orphaned the
      # pre-run covariate rows (SQL 21, written pre-submit): on a failed submit the
      # old rollback never fired and no run record landed, leaving covariate metric
      # rows with no owning perf.runs row (directive 5a). Now: either the run record
      # lands and ADOPTS those covariate rows (failed-class success), or — if the
      # reduced capture/flags/run_record breaks — this rollback wipes them. Either
      # way no metric row is ever left orphaned.
      #
      # Including steps.flags.outcome == 'failure' closes directive 5b: a broken
      # flag decision must also roll the artifact back (no run record — and no
      # adopted covariates — may exist without a flag decision), symmetric with the
      # capture/run_record legs. rollback_run_metrics.py DELETEs perf.{runs,metrics,
      # ch_inserts} by run_id, so it cleans the covariate rows too.
      # capture_onmaster.outcome == 'failure' (Tier 0 only) is in the OR so a
      # broken on-master server-side capture rolls back this t0 run_id too (spec
      # Q1 failure order: capture — event-log + on-master — then run-record; a
      # break in either half is an incomplete t0 artifact). It is 'skipped' on t1
      # (never submitted), which is neither 'failure' nor a trigger here.
      if: ${{ !cancelled() && (steps.capture.outcome == 'failure' || steps.capture_onmaster.outcome == 'failure' || steps.flags.outcome == 'failure' || steps.run_record.outcome == 'failure') }}
      shell: bash
      env:
        METRICS_CH_HOST: ${{ inputs.metrics_ch_host }}
        METRICS_CH_USER: ${{ inputs.metrics_ch_user }}
        METRICS_CH_PASSWORD: ${{ inputs.metrics_ch_password }}
      run: python benchmarks/scripts/rollback_run_metrics.py

    - name: "Export metrics to DWH bucket (arm ${{ inputs.arm }})"
      # Assumes the cross-account DWH write role (clickbench-load-test-ci is a
      # trusted principal) to stream this arm's perf.runs/metrics/ch_inserts to
      # the DWH bucket as Parquet; the DWH side ingests via s3queue.
      #
      # OUTCOME-CLASS EXPORT (task #6 directive 6, plan §6.5/§10): exports in BOTH
      # classes so a FAILED-class run reaches the DWH fully — MARKED via
      # runtime['outcome']='failed'. Dashboards EXCLUDE failed runs by outcome, not
      # by absence; the atomic/gated discipline is preserved by gating on the same
      # capture+flags+run_record success chain (a rolled-back run has no rows to
      # export and this step is skipped). NOT gated on submit success.
      if: ${{ !cancelled() && steps.capture.outcome == 'success' && steps.flags.outcome == 'success' && steps.run_record.outcome == 'success' }}
      shell: bash
      env:
        METRICS_CH_HOST: ${{ inputs.metrics_ch_host }}
        METRICS_CH_USER: ${{ inputs.metrics_ch_user }}
        METRICS_CH_PASSWORD: ${{ inputs.metrics_ch_password }}
        DWH_ROLE_ARN: ${{ inputs.dwh_role_arn }}
      run: python benchmarks/scripts/export_metrics_to_dwh.py

    - name: "Verify integrity (arm ${{ inputs.arm }})"
      # Runs AFTER capture + run-record + export so the integrity metrics are
      # already persisted and exported; this step only reads them back and fails
      # the job on a mismatch (contract §3 — mismatch fails outright). Gated on
      # capture AND run-record success: if the run record failed, the rollback
      # step has already wiped this arm's perf.* rows, so integrity is not
      # evaluable here (and the job is already red from that failure) — a second
      # "no integrity metrics found" failure would just be noise. Independent of
      # export so a mismatch is surfaced even if export failed. Must not suppress
      # the other arm — failure isolation is at the job level (arm 2 runs
      # regardless of arm 1), so a red integrity check here marks THIS arm's run
      # bad without stopping the pair.
      #
      # STILL GATED ON SUBMIT SUCCESS (task #6 directive 3): a failed-class run is
      # 'integrity_unverified' BY DEFINITION — its load is partial, so there is no
      # meaningful rows_delivered==rows_expected comparison, and the integrity SQL
      # (20) was only TOLERANTLY captured (may be absent) for that class. Running
      # this verdict on a failed-class run would either error ("no integrity
      # metrics") or falsely FAIL a run that is already correctly marked
      # outcome='failed'. So integrity verification is a SUCCESS-class-only gate.
      #
      # TIER 0 SKIPS integrity (spec Q3): ENGINE=Null delivers NO rows, so there
      # is no rows_delivered==rows_expected to verify (SQL 20 and check_integrity
      # never ran for t0). Gated on tier=='1'.
      if: ${{ !cancelled() && inputs.tier == '1' && steps.submit.outcome == 'success' && steps.capture.outcome == 'success' && steps.run_record.outcome == 'success' }}
      shell: bash
      env:
        METRICS_CH_HOST: ${{ inputs.metrics_ch_host }}
        METRICS_CH_USER: ${{ inputs.metrics_ch_user }}
        METRICS_CH_PASSWORD: ${{ inputs.metrics_ch_password }}
      run: python benchmarks/scripts/check_integrity.py
